# PETROVA 300K – CI Pipeline
name: PETROVA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DBT_PROFILES_DIR: ./dbt

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install sqlfluff ruff yamllint

      - name: SQLFluff lint (dbt models)
        run: |
          sqlfluff lint dbt/models/ --dialect snowflake --config .sqlfluff

      - name: Ruff lint (Python)
        run: |
          ruff check airflow/ dashboards/ scripts/

      - name: YAML lint
        run: |
          yamllint -d relaxed .github/ great_expectations/ monitoring/

  dbt-test:
    name: dbt Compile & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: |
          pip install dbt-snowflake dbt-databricks

      - name: dbt deps
        run: cd dbt && dbt deps --profiles-dir .

      - name: dbt compile (syntax check)
        run: cd dbt && dbt compile --target dev --profiles-dir .
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: cd terraform && terraform init -backend=false

      - name: Terraform Validate
        run: cd terraform && terraform validate

      - name: Terraform Format Check
        run: cd terraform && terraform fmt -check -recursive
