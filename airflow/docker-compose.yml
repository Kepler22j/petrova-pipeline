version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'zTvhk2O8fS7gJxPRMqRzf7tCf1zV3pFjSFRR2k9xA0M='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'petrova-300k-secret'
    _PIP_ADDITIONAL_REQUIREMENTS: ''
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./config:/opt/airflow/config
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - petrova-net

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petrova-net

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Jay \
          --lastname Pechnarai \
          --role Admin \
          --email pechnarai.jakapong@gmail.com
        echo "Airflow init complete!"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped

  # ── PySpark + Jupyter for Databricks notebook development ──
  jupyter-spark:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.3
    container_name: petrova-spark
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "petrova"
      SPARK_OPTS: "--packages io.delta:delta-spark_2.12:3.2.1 --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog"
    ports:
      - "8888:8888"   # Jupyter Lab
      - "4040:4040"   # Spark UI
    volumes:
      - ../databricks/notebooks:/home/jovyan/notebooks
      - ../databricks/dlt:/home/jovyan/dlt
      - spark-data:/home/jovyan/data
    networks:
      - petrova-net

  # ── dbt runner for local end-to-end testing ──
  dbt-runner:
    image: python:3.11-slim
    container_name: petrova-dbt
    working_dir: /dbt
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "=== Installing dbt-postgres ==="
        pip install --quiet dbt-postgres
        echo "Waiting for PostgreSQL..."
        while ! python -c "import socket; s=socket.socket(); s.connect(('postgres',5432)); s.close()" 2>/dev/null; do sleep 1; done
        echo "PostgreSQL ready. Initializing petrova database..."
        apt-get update -qq && apt-get install -y -qq postgresql-client > /dev/null 2>&1
        export PGPASSWORD=airflow
        echo "SELECT 'CREATE DATABASE petrova' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'petrova')" | psql -h postgres -U airflow -d airflow -tA | psql -h postgres -U airflow -d airflow 2>/dev/null || true
        psql -h postgres -U airflow -d petrova -c "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'petrova') THEN
              CREATE ROLE petrova WITH LOGIN PASSWORD 'petrova';
            END IF;
          END \$\$;
          CREATE SCHEMA IF NOT EXISTS bronze;
          CREATE SCHEMA IF NOT EXISTS silver;
          CREATE SCHEMA IF NOT EXISTS gold;
          GRANT ALL PRIVILEGES ON DATABASE petrova TO petrova;
          GRANT ALL PRIVILEGES ON SCHEMA public, bronze, silver, gold TO petrova;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO petrova;
          ALTER DEFAULT PRIVILEGES IN SCHEMA bronze GRANT ALL ON TABLES TO petrova;
          ALTER DEFAULT PRIVILEGES IN SCHEMA silver GRANT ALL ON TABLES TO petrova;
          ALTER DEFAULT PRIVILEGES IN SCHEMA gold GRANT ALL ON TABLES TO petrova;
        "
        echo "=== Database initialized ==="
        mkdir -p /root/.dbt
        cp /dbt/profiles_local.yml /root/.dbt/profiles.yml
        echo "=== Running dbt deps ==="
        dbt deps --target local
        echo "=== Running dbt seed ==="
        dbt seed --target local
        echo "=== Running dbt run ==="
        dbt run  --target local
        echo "=== Running dbt test ==="
        dbt test --target local
        echo "========================================="
        echo "  PETROVA dbt pipeline COMPLETE"
        echo "========================================="
    environment:
      DBT_PG_HOST: postgres
      DBT_PG_USER: petrova
      DBT_PG_PASSWORD: petrova
      DBT_PROFILES_DIR: /root/.dbt
    volumes:
      - ../dbt:/dbt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petrova-net

volumes:
  postgres-data:
  airflow-logs:
  spark-data:

networks:
  petrova-net:
    driver: bridge
