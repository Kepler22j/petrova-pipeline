.c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}
.c-blue .th{fill:#0C447C}.c-blue .ts{fill:#185FA5}
/* amber */
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}
