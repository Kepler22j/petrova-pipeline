<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1840" viewBox="0 0 680 920" style="font-family:'Segoe UI',Arial,sans-serif;background:#fff">
<style>
text{fill:#3d3d3a}
.th{font-size:14px;font-weight:500}
.ts{font-size:12px;fill:#73726c}
.arr{stroke:#73726c;stroke-width:1.5}
.leader{stroke:#b4b2a9;stroke-width:0.5;stroke-dasharray:3 3}
/* coral */
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.c-coral .th{fill:#712B13}.c-coral .ts{fill:#993C1D}
/* purple */
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}
/* teal */
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
