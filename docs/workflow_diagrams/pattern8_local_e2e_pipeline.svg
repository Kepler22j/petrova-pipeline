<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
text{font-family:Arial,Helvetica,sans-serif}
.title{font-size:18px;font-weight:bold;fill:#1a1a1a}
.label{font-size:11px;fill:#1a1a1a}
.small{font-size:10px;fill:#555}
.keybold{font-size:10px;font-weight:bold;fill:#0C447C}
.key{font-size:10px;fill:#1a1a1a}
.arrow{fill:none;stroke:#444;stroke-width:1.5;marker-end:url(#ah8)}
</style>
<defs><marker id="ah8" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs>
<text x="350" y="28" text-anchor="middle" class="title">PETROVA: Local End-to-End Pipeline</text>
<line x1="30" y1="38" x2="670" y2="38" stroke="#ddd"/>
<rect x="30" y="55" width="90" height="45" rx="4" fill="#F0F9FF" stroke="#93C5FD"/>
<text x="75" y="73" text-anchor="middle" class="label" style="font-weight:bold">Docker</text>
<text x="75" y="86" text-anchor="middle" class="small">compose up</text>
<path d="M120,77 L155,77" class="arrow"/>
<rect x="155" y="50" width="110" height="60" rx="4" fill="#EDE9FE" stroke="#A78BFA"/>
<text x="210" y="66" text-anchor="middle" class="label" style="font-weight:bold">6 Services</text>
<text x="210" y="79" text-anchor="middle" class="small">postgres</text>
<text x="210" y="91" text-anchor="middle" class="small">airflow (web+sched)</text>
<text x="210" y="103" text-anchor="middle" class="small">dbt + spark + jupyter</text>
<path d="M265,80 L305,80" class="arrow"/>
<rect x="305" y="55" width="80" height="30" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
<text x="345" y="74" text-anchor="middle" class="label">dbt seed</text>
<path d="M385,70 L405,70" class="arrow"/>
<rect x="405" y="55" width="80" height="30" rx="4" fill="#DBEAFE" stroke="#60A5FA"/>
<text x="445" y="74" text-anchor="middle" class="label">dbt run</text>
<path d="M485,70 L505,70" class="arrow"/>
<rect x="505" y="55" width="80" height="30" rx="4" fill="#DCFCE7" stroke="#22C55E"/>
<text x="545" y="74" text-anchor="middle" class="label">dbt test</text>
<path d="M545,85 L545,115" class="arrow"/>
<rect x="460" y="115" width="170" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
<text x="545" y="133" text-anchor="middle" class="label" style="font-weight:bold;fill:#059669">51/51 TESTS PASS</text>
<text x="545" y="148" text-anchor="middle" class="small">Bronze: Silver: Gold validated</text>
<rect x="305" y="100" width="130" height="60" rx="4" fill="#FFF7ED" stroke="#FDBA74"/>
<text x="370" y="116" text-anchor="middle" class="label" style="font-weight:bold">Airflow DAG</text>
<text x="370" y="129" text-anchor="middle" class="small">petrova_validated_pipeline</text>
<text x="370" y="142" text-anchor="middle" class="small">Scheduled: daily 6AM</text>
<text x="370" y="154" text-anchor="middle" class="small">Duration: ~47 min</text>
<rect x="30" y="120" width="240" height="45" rx="4" fill="#F0F9FF" stroke="#93C5FD"/>
<text x="150" y="138" text-anchor="middle" class="label" style="font-weight:bold">One-Command Run</text>
<text x="150" y="151" text-anchor="middle" class="small">make run (or docker compose up)</text>
<text x="150" y="161" text-anchor="middle" class="small">Entire pipeline: zero manual steps</text>
<rect x="30" y="185" width="640" height="125" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="45" y="205" class="keybold">Key Concepts</text>
<text x="45" y="220" class="key">Reproducible: Clone repo, make run, pipeline works. Zero tribal knowledge.</text>
<text x="45" y="235" class="key">Same models run on PostgreSQL (local) and Snowflake (prod). No code changes.</text>
<text x="45" y="250" class="key">Airflow orchestrates: seed, run bronze, run silver, run gold, test. With trigger_rule failover.</text>
<line x1="45" y1="262" x2="655" y2="262" stroke="#E2E8F0"/>
<text x="45" y="278" class="keybold">Docker Services</text>
<text x="45" y="293" class="key">postgres (warehouse) | airflow-webserver (UI) | airflow-scheduler (DAG runner) | airflow-init (setup)</text>
<text x="45" y="305" class="key">petrova-dbt (dbt runner) | petrova-spark (Jupyter + PySpark)</text>
</svg>