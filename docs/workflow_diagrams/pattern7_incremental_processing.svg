<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
text{font-family:Arial,Helvetica,sans-serif}
.title{font-size:18px;font-weight:bold;fill:#1a1a1a}
.label{font-size:11px;fill:#1a1a1a}
.small{font-size:10px;fill:#555}
.keybold{font-size:10px;font-weight:bold;fill:#0C447C}
.key{font-size:10px;fill:#1a1a1a}
.arrow{fill:none;stroke:#444;stroke-width:1.5;marker-end:url(#ah7)}
</style>
<defs><marker id="ah7" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs>
<text x="350" y="28" text-anchor="middle" class="title">PETROVA: Incremental Processing</text>
<line x1="30" y1="38" x2="670" y2="38" stroke="#ddd"/>
<rect x="30" y="55" width="100" height="45" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
<text x="80" y="73" text-anchor="middle" class="label" style="font-weight:bold">Source</text>
<text x="80" y="86" text-anchor="middle" class="small">New records only</text>
<path d="M130,77 L180,77" class="arrow"/>
<rect x="180" y="50" width="140" height="55" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
<text x="250" y="68" text-anchor="middle" class="label" style="font-weight:bold">Auto Loader</text>
<text x="250" y="81" text-anchor="middle" class="small">Databricks: cloudFiles</text>
<text x="250" y="94" text-anchor="middle" class="small">Tracks new files automatically</text>
<path d="M320,77 L370,77" class="arrow"/>
<rect x="370" y="50" width="140" height="55" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
<text x="440" y="68" text-anchor="middle" class="label" style="font-weight:bold">dbt incremental</text>
<text x="440" y="81" text-anchor="middle" class="small">is_incremental() macro</text>
<text x="440" y="94" text-anchor="middle" class="small">WHERE date &gt; max(date)</text>
<path d="M510,77 L560,77" class="arrow"/>
<rect x="560" y="58" width="110" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
<text x="615" y="76" text-anchor="middle" class="label" style="font-weight:bold;fill:#059669">Gold Tables</text>
<text x="615" y="89" text-anchor="middle" class="small">Append only</text>
<rect x="30" y="120" width="300" height="55" rx="4" fill="#FFF7ED" stroke="#FDBA74"/>
<text x="180" y="138" text-anchor="middle" class="label" style="font-weight:bold">Full Refresh Fallback</text>
<text x="180" y="151" text-anchor="middle" class="small">dbt run --full-refresh --select model_name</text>
<text x="180" y="164" text-anchor="middle" class="small">When: schema change, data corruption, first run</text>
<rect x="30" y="195" width="640" height="75" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="45" y="215" class="keybold">Key Concepts</text>
<text x="45" y="230" class="key">Incremental: process only new/changed records. 400K rows/day = seconds vs minutes for full rebuild.</text>
<text x="45" y="245" class="key">Auto Loader: Databricks structured streaming for file ingestion. Tracks checkpoint state automatically.</text>
<text x="45" y="260" class="keybold">Interview: "Incremental is 100x faster. Full refresh is the escape hatch for schema changes."</text>
</svg>