<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
text{font-family:Arial,Helvetica,sans-serif}
.title{font-size:18px;font-weight:bold;fill:#1a1a1a}
.label{font-size:11px;fill:#1a1a1a}
.small{font-size:10px;fill:#555}
.keybold{font-size:10px;font-weight:bold;fill:#0C447C}
.key{font-size:10px;fill:#1a1a1a}
.arrow{fill:none;stroke:#444;stroke-width:1.5;marker-end:url(#ah4)}
</style>
<defs><marker id="ah4" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs>
<text x="450" y="28" text-anchor="middle" class="title">PETROVA: SCD Type 2 Slowly Changing Dimensions</text>
<line x1="30" y1="38" x2="870" y2="38" stroke="#ddd"/>
<rect x="50" y="55" width="140" height="45" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
<text x="120" y="75" text-anchor="middle" class="label" style="font-weight:bold">sap_vendors</text>
<text x="120" y="88" text-anchor="middle" class="small">Source: raw vendor data</text>
<rect x="230" y="55" width="160" height="45" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
<text x="310" y="75" text-anchor="middle" class="label" style="font-weight:bold">equipment_master</text>
<text x="310" y="88" text-anchor="middle" class="small">Source: raw equipment data</text>
<path d="M120,100 L120,140" class="arrow"/>
<path d="M310,100 L310,140" class="arrow"/>
<rect x="50" y="140" width="340" height="60" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
<text x="220" y="160" text-anchor="middle" class="label" style="font-weight:bold">dbt snapshot (snapshots/*.sql)</text>
<text x="220" y="175" text-anchor="middle" class="small">Compares current vs previous: detects changes, creates history</text>
<text x="220" y="188" text-anchor="middle" class="small">Adds: dbt_valid_from, dbt_valid_to, dbt_scd_id</text>
<path d="M150,200 L150,240" class="arrow"/>
<path d="M290,200 L290,240" class="arrow"/>
<rect x="50" y="240" width="200" height="65" rx="4" fill="#DBEAFE" stroke="#3B82F6"/>
<text x="150" y="260" text-anchor="middle" class="label" style="font-weight:bold">Strategy: TIMESTAMP</text>
<text x="150" y="275" text-anchor="middle" class="small">snap_vendor_history.sql</text>
<text x="150" y="288" text-anchor="middle" class="small">updated_at column tracks changes</text>
<text x="150" y="298" text-anchor="middle" class="small">Faster: only checks one column</text>
<rect x="270" y="240" width="200" height="65" rx="4" fill="#DCFCE7" stroke="#22C55E"/>
<text x="370" y="260" text-anchor="middle" class="label" style="font-weight:bold">Strategy: CHECK</text>
<text x="370" y="275" text-anchor="middle" class="small">snap_equipment_history.sql</text>
<text x="370" y="288" text-anchor="middle" class="small">Compares ALL columns for changes</text>
<text x="370" y="298" text-anchor="middle" class="small">Safer: catches any change</text>
<path d="M150,305 L260,340" class="arrow"/>
<path d="M370,305 L260,340" class="arrow"/>
<rect x="160" y="340" width="200" height="50" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="260" y="358" text-anchor="middle" class="label" style="font-weight:bold">scd2_merge macro</text>
<text x="260" y="373" text-anchor="middle" class="small">Custom Jinja: handles MERGE for</text>
<text x="260" y="383" text-anchor="middle" class="small">both Snowflake + PostgreSQL</text>
<path d="M260,390 L260,415" class="arrow"/>
<rect x="130" y="415" width="260" height="35" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
<text x="260" y="433" text-anchor="middle" class="label" style="font-weight:bold;fill:#059669">dim_vendor / dim_equipment</text>
<text x="260" y="445" text-anchor="middle" class="small">Full history: who changed what, when</text>
<rect x="520" y="55" width="350" height="395" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="535" y="80" class="keybold">What is SCD Type 2?</text>
<text x="535" y="95" class="key">Preserves history by creating new rows</text>
<text x="535" y="110" class="key">on change (vs Type 1 = overwrite).</text>
<text x="535" y="125" class="key">Each row has valid_from + valid_to dates.</text>
<text x="535" y="140" class="key">Current record: valid_to = NULL.</text>
<line x1="535" y1="155" x2="855" y2="155" stroke="#E2E8F0"/>
<text x="535" y="175" class="keybold">Timestamp vs Check Strategy</text>
<text x="535" y="190" class="key">Timestamp: needs updated_at column.</text>
<text x="535" y="205" class="key">  Faster but misses manual edits.</text>
<text x="535" y="220" class="key">Check: compares all specified columns.</text>
<text x="535" y="235" class="key">  Slower but catches everything.</text>
<text x="535" y="250" class="key">PETROVA uses BOTH: best practice.</text>
<line x1="535" y1="265" x2="855" y2="265" stroke="#E2E8F0"/>
<text x="535" y="285" class="keybold">Cross-Database Compatibility</text>
<text x="535" y="300" class="key">scd2_merge macro uses:</text>
<text x="535" y="315" class="key">  dbt.current_timestamp() not NOW()</text>
<text x="535" y="330" class="key">  dbt.datediff() not DATEDIFF()</text>
<text x="535" y="345" class="key">Works on both Snowflake + PostgreSQL.</text>
<line x1="535" y1="358" x2="855" y2="358" stroke="#E2E8F0"/>
<text x="535" y="378" class="keybold">Exam Relevance</text>
<text x="535" y="393" class="key">dbt cert: snapshot config, strategies</text>
<text x="535" y="408" class="key">SnowPro: Time Travel vs SCD2 trade-off</text>
<text x="535" y="423" class="key">Databricks: Delta Lake MERGE patterns</text>
<text x="535" y="443" class="keybold">Interview: "We use both strategies:</text>
<text x="535" y="453" class="key">timestamp for speed, check for safety."</text>
</svg>