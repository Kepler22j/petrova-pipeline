<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
text{font-family:Arial,Helvetica,sans-serif}
.title{font-size:18px;font-weight:bold;fill:#1a1a1a}
.layer{font-size:13px;font-weight:bold;fill:#1a1a1a}
.label{font-size:11px;fill:#1a1a1a}
.small{font-size:10px;fill:#555}
.keybold{font-size:10px;font-weight:bold;fill:#0C447C}
.key{font-size:10px;fill:#1a1a1a}
.pass{fill:#059669;font-size:11px;font-weight:bold}
.fail{fill:#DC2626;font-size:11px;font-weight:bold}
.arrow{fill:none;stroke:#444;stroke-width:1.5;marker-end:url(#ah2)}
</style>
<defs><marker id="ah2" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs>
<text x="450" y="28" text-anchor="middle" class="title">PETROVA: 3-Gate Validation Workflow</text>
<line x1="30" y1="38" x2="870" y2="38" stroke="#ddd"/>
<rect x="50" y="55" width="120" height="45" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
<text x="110" y="75" text-anchor="middle" class="label" style="font-weight:bold">BRONZE RAW</text>
<text x="110" y="88" text-anchor="middle" class="small">400K rows/day</text>
<path d="M170,77 L220,77" class="arrow"/>
<rect x="220" y="55" width="140" height="55" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
<text x="290" y="73" text-anchor="middle" class="label" style="font-weight:bold">GATE 1: SCHEMA</text>
<text x="290" y="86" text-anchor="middle" class="small">Column count, data types,</text>
<text x="290" y="97" text-anchor="middle" class="small">NOT NULL constraints</text>
<path d="M360,82 L410,82" class="arrow"/>
<text x="380" y="75" class="pass">PASS</text>
<path d="M290,110 L290,145" class="arrow"/>
<text x="300" y="135" class="fail">FAIL</text>
<rect x="230" y="145" width="120" height="35" rx="4" fill="#FEE2E2" stroke="#F87171"/>
<text x="290" y="162" text-anchor="middle" class="label">Quarantine</text>
<text x="290" y="174" text-anchor="middle" class="small">schema_violation</text>
<rect x="410" y="55" width="140" height="55" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
<text x="480" y="73" text-anchor="middle" class="label" style="font-weight:bold">GATE 2: BUSINESS</text>
<text x="480" y="86" text-anchor="middle" class="small">Range checks, valid codes,</text>
<text x="480" y="97" text-anchor="middle" class="small">threshold validation</text>
<path d="M550,82 L600,82" class="arrow"/>
<text x="570" y="75" class="pass">PASS</text>
<path d="M480,110 L480,145" class="arrow"/>
<text x="490" y="135" class="fail">FAIL</text>
<rect x="420" y="145" width="120" height="35" rx="4" fill="#FEE2E2" stroke="#F87171"/>
<text x="480" y="162" text-anchor="middle" class="label">Quarantine</text>
<text x="480" y="174" text-anchor="middle" class="small">business_rule_fail</text>
<rect x="600" y="55" width="140" height="55" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
<text x="670" y="73" text-anchor="middle" class="label" style="font-weight:bold">GATE 3: REFERENTIAL</text>
<text x="670" y="86" text-anchor="middle" class="small">FK integrity, lookup joins,</text>
<text x="670" y="97" text-anchor="middle" class="small">orphan detection</text>
<path d="M670,110 L670,210" class="arrow"/>
<text x="680" y="165" class="pass">PASS</text>
<path d="M740,82 L800,82 L800,145" class="arrow"/>
<text x="810" y="120" class="fail">FAIL</text>
<rect x="740" y="145" width="120" height="35" rx="4" fill="#FEE2E2" stroke="#F87171"/>
<text x="800" y="162" text-anchor="middle" class="label">Quarantine</text>
<text x="800" y="174" text-anchor="middle" class="small">ref_integrity_fail</text>
<rect x="600" y="210" width="140" height="45" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
<text x="670" y="230" text-anchor="middle" class="label" style="font-weight:bold;fill:#059669">SILVER CLEAN</text>
<text x="670" y="243" text-anchor="middle" class="small">Only validated records</text>
<rect x="50" y="210" width="500" height="160" rx="4" fill="#F0F9FF" stroke="#93C5FD"/>
<text x="60" y="230" class="layer">10 CLEANING LOGICS (Silver Layer)</text>
<rect x="60" y="240" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="117" y="258" text-anchor="middle" class="small">1. NULL handling</text>
<rect x="185" y="240" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="242" y="258" text-anchor="middle" class="small">2. Type casting</text>
<rect x="310" y="240" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="367" y="258" text-anchor="middle" class="small">3. Deduplication</text>
<rect x="435" y="240" width="105" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="487" y="258" text-anchor="middle" class="small">4. Trim/normalize</text>
<rect x="60" y="278" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="117" y="296" text-anchor="middle" class="small">5. Range clamp</text>
<rect x="185" y="278" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="242" y="296" text-anchor="middle" class="small">6. Date validation</text>
<rect x="310" y="278" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="367" y="296" text-anchor="middle" class="small">7. FK lookup</text>
<rect x="435" y="278" width="105" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="487" y="296" text-anchor="middle" class="small">8. Default fill</text>
<rect x="60" y="316" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="117" y="334" text-anchor="middle" class="small">9. Unit convert</text>
<rect x="185" y="316" width="115" height="28" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
<text x="242" y="334" text-anchor="middle" class="small">10. Business calc</text>
<rect x="50" y="390" width="500" height="120" rx="4" fill="#FFF7ED" stroke="#FDBA74"/>
<text x="60" y="410" class="layer">QUARANTINE RECOVERY FLOW</text>
<rect x="70" y="425" width="100" height="35" rx="4" fill="#FEE2E2" stroke="#F87171"/>
<text x="120" y="440" text-anchor="middle" class="label">Quarantine</text>
<text x="120" y="453" text-anchor="middle" class="small">tagged records</text>
<path d="M170,442 L210,442" class="arrow"/>
<rect x="210" y="425" width="100" height="35" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
<text x="260" y="440" text-anchor="middle" class="label">Review</text>
<text x="260" y="453" text-anchor="middle" class="small">manual/auto</text>
<path d="M310,442 L350,442" class="arrow"/>
<rect x="350" y="420" width="90" height="20" rx="3" fill="#DCFCE7" stroke="#22C55E"/>
<text x="395" y="434" text-anchor="middle" class="small">Fix: Re-ingest</text>
<rect x="350" y="448" width="90" height="20" rx="3" fill="#FEE2E2" stroke="#F87171"/>
<text x="395" y="462" text-anchor="middle" class="small">Reject: Archive</text>
<rect x="600" y="270" width="270" height="240" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="615" y="295" class="keybold">Why 3 Gates?</text>
<text x="615" y="310" class="key">Each gate catches different errors.</text>
<text x="615" y="325" class="key">Sequential = fail fast, save compute.</text>
<text x="615" y="340" class="key">Tagged quarantine = traceable recovery.</text>
<line x1="615" y1="352" x2="855" y2="352" stroke="#E2E8F0"/>
<text x="615" y="372" class="keybold">dbt Implementation</text>
<text x="615" y="387" class="key">stg_* models = Gate 1 (schema)</text>
<text x="615" y="402" class="key">int_* models = Gate 2+3 (business+ref)</text>
<text x="615" y="417" class="key">51 tests validate all gates</text>
<line x1="615" y1="430" x2="855" y2="430" stroke="#E2E8F0"/>
<text x="615" y="450" class="keybold">Interview Answer</text>
<text x="615" y="465" class="key">"3-gate validation implements SPC</text>
<text x="615" y="480" class="key">principles: catch defects at source,</text>
<text x="615" y="495" class="key">not downstream where cost multiplies."</text>
</svg>