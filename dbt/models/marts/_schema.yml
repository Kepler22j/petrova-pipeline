version: 2

models:
  - name: fct_daily_sensor_kpi
    description: "Gold – Daily sensor KPI aggregations (avg, p95, stddev). RBAC-protected."
    columns:
      - name: kpi_sk
        tests: [unique, not_null]
      - name: total_readings
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1

  - name: fct_daily_revenue
    description: "Gold – Daily revenue by material group from SAP orders."
    columns:
      - name: revenue_sk
        tests: [unique, not_null]
      - name: total_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

  - name: dim_equipment
    description: "Gold – Equipment dimension with lifecycle stage."
    columns:
      - name: equipment_sk
        tests: [unique, not_null]

  - name: dim_vendor
    description: "Gold – Vendor dimension (SCD2-aware, current + historical)."
    columns:
      - name: vendor_sk
        tests: [unique, not_null]

  - name: fct_sensor_alerts
    description: "Gold – SPC alert engine. 6 alert categories from 3 primitives (STDDEV, LAG, THRESHOLD). Composite severity: CRITICAL/WARNING/OK."
    columns:
      - name: alert_sk
        tests: [unique, not_null]
      - name: sensor_id
        tests: [not_null]
      - name: alert_severity
        tests:
          - accepted_values:
              values: ['CRITICAL', 'WARNING', 'OK']
      - name: stability_level
        tests:
          - accepted_values:
              values: ['STABLE', 'NORMAL', 'UNSTABLE', 'INSUFFICIENT_DATA']
      - name: signal_quality
        tests:
          - accepted_values:
              values: ['CLEAN', 'NOISY', 'VERY_NOISY', 'INVALID']
      - name: volatility_trend
        tests:
          - accepted_values:
              values: ['STEADY', 'IMPROVING', 'INCREASING', 'DEGRADING', 'NO_HISTORY']
      - name: spike_status
        tests:
          - accepted_values:
              values: ['NORMAL', 'SHIFT', 'SPIKE', 'NO_HISTORY']

  - name: dim_customer
    description: "Gold – Customer dimension (placeholder for SAP integration)."
    columns:
      - name: customer_sk
        tests: [unique, not_null]
